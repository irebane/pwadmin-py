<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}pwAdmin{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/images/pwicon3.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Tailwind's text-* utilities are rem-based, so bumping the root size scales all of them proportionally. */
    html { font-size: 112.5%; }
    button { font-weight: 600; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    [x-cloak] { display: none !important; }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script>
  (function(){
    function getCsrf(){
      var c=document.cookie.split(';');
      for(var i=0;i<c.length;i++){
        var p=c[i].trim();
        if(p.indexOf('csrf_token=')===0) return p.substring(11);
      }
      return '';
    }
    var MUTATING={'POST':1,'PUT':1,'DELETE':1,'PATCH':1};
    var _fetch=window.fetch;
    window.fetch=function(url,opts){
      opts=opts||{};
      if(opts.method && MUTATING[opts.method.toUpperCase()]){
        var h=opts.headers||{};
        if(h instanceof Headers){h.set('X-CSRF-Token',getCsrf());}
        else{h['X-CSRF-Token']=getCsrf();}
        opts.headers=h;
      }
      return _fetch(url,opts).then(function(r){
        if(r.status===401){window.location.href='/';return new Response('',{status:401});}
        return r;
      });
    };
    var _open=XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open=function(method){
      this._xm=method;
      return _open.apply(this,arguments);
    };
    var _send=XMLHttpRequest.prototype.send;
    XMLHttpRequest.prototype.send=function(){
      if(this._xm && MUTATING[this._xm.toUpperCase()])
        this.setRequestHeader('X-CSRF-Token',getCsrf());
      this.addEventListener('load',function(){
        if(this.status===401) window.location.href='/';
      });
      return _send.apply(this,arguments);
    };
  })();
  </script>
  {% block head %}{% endblock %}
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen antialiased">
  {% block nav %}
  <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
    <div class="px-4 flex items-center justify-between h-12">
      <div class="flex items-center gap-0.5">
        <span class="text-blue-400 font-bold text-sm mr-4">&#9876; PW Admin</span>
        <a href="/account" class="px-3 py-1.5 text-xs rounded text-slate-400 hover:text-white hover:bg-slate-800 transition">Account</a>
        {% if is_admin %}
        <a href="/server" class="px-3 py-1.5 text-xs rounded text-slate-400 hover:text-white hover:bg-slate-800 transition">Server</a>
        <a href="/item-builder" class="px-3 py-1.5 text-xs rounded text-slate-400 hover:text-white hover:bg-slate-800 transition">Item-Builder</a>
        <a href="/gshop" class="px-3 py-1.5 text-xs rounded text-slate-400 hover:text-white hover:bg-slate-800 transition">G-Shop</a>
        <a href="/events" class="px-3 py-1.5 text-xs rounded text-slate-400 hover:text-white hover:bg-slate-800 transition">Events</a>
        {% endif %}
      </div>
      <div class="flex items-center gap-3">
        <button onclick="fetch('/api/logout',{method:'POST'}).then(()=>location.href='/')"
          class="text-xs px-3 py-1 bg-slate-800 hover:bg-red-950 border border-slate-700 hover:border-red-900 rounded text-slate-400 hover:text-red-400 transition font-semibold">
          Logout
        </button>
      </div>
    </div>
  </nav>
  {% endblock %}
  <main class="p-4">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>

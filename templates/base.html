<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}pwAdmin{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen antialiased">
  {% block nav %}
  <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
    <div class="px-4 flex items-center justify-between h-12">
      <div class="flex items-center gap-0.5">
        <span class="text-blue-400 font-bold text-sm mr-4">&#9876; PW Admin</span>
        <a href="/account" class="px-3 py-1.5 text-xs rounded text-slate-400 hover:text-white hover:bg-slate-800 transition">Account</a>
        <a href="/server" class="px-3 py-1.5 text-xs rounded text-slate-400 hover:text-white hover:bg-slate-800 transition">Server</a>
        <a href="/gshop" class="px-3 py-1.5 text-xs rounded text-slate-400 hover:text-white hover:bg-slate-800 transition">G-Shop</a>
        <a href="/item-builder" class="px-3 py-1.5 text-xs rounded text-slate-400 hover:text-white hover:bg-slate-800 transition">Items</a>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="fetch('/api/logout',{method:'POST'}).then(()=>location.href='/')"
          class="text-xs px-3 py-1 bg-slate-800 hover:bg-red-950 border border-slate-700 hover:border-red-900 rounded text-slate-400 hover:text-red-400 transition">
          Logout
        </button>
      </div>
    </div>
  </nav>
  {% endblock %}
  <main class="p-4">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>

{% extends "base.html" %}
{% block title %}Server — pwAdmin{% endblock %}

{% block content %}
<div class="max-w-screen-xl mx-auto" x-data="serverPage()">

  <h1 class="text-sm font-semibold text-slate-300 mb-5">Server Management</h1>

  <div class="grid lg:grid-cols-5 gap-5">

    <!-- ── LEFT COLUMN (col-span-2) ── -->
    <div class="lg:col-span-2 flex flex-col gap-5">

      <!-- SERVER CONFIG ─────────────────────────────────────────── -->
      <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
        <div class="px-5 py-3 border-b border-slate-800">
          <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-widest">Server Config</h2>
        </div>
        <div class="p-5 space-y-5">

          <!-- Class mask -->
          <div>
            <div class="text-xs text-slate-500 mb-2">Allowed Classes
              <span class="ml-2 text-slate-700 font-mono" x-text="'mask: ' + classMask"></span>
            </div>
            <div class="grid grid-cols-2 gap-1.5">
              <template x-for="cls in classes" :key="cls.id">
                <label class="flex items-center gap-2 cursor-pointer select-none group">
                  <input type="checkbox" :checked="cls.checked"
                    @change="cls.checked = $event.target.checked; calcMask()"
                    class="w-3.5 h-3.5 rounded accent-blue-500 cursor-pointer">
                  <span class="text-xs text-slate-300 group-hover:text-white transition"
                    x-text="cls.name"></span>
                </label>
              </template>
            </div>
          </div>

          <!-- Rates -->
          <div>
            <div class="text-xs text-slate-500 mb-2">Rates</div>
            <div class="grid grid-cols-2 gap-2">
              <div>
                <label class="block text-xs text-slate-600 mb-1">EXP Bonus</label>
                <input type="number" x-model.number="xp" min="0"
                  class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-blue-500">
              </div>
              <div>
                <label class="block text-xs text-slate-600 mb-1">SP Bonus</label>
                <input type="number" x-model.number="sp" min="0"
                  class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-blue-500">
              </div>
              <div>
                <label class="block text-xs text-slate-600 mb-1">Drop Bonus</label>
                <input type="number" x-model.number="drop" min="0"
                  class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-blue-500">
              </div>
              <div>
                <label class="block text-xs text-slate-600 mb-1">Gold Bonus</label>
                <input type="number" x-model.number="gold" min="0"
                  class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-blue-500">
              </div>
            </div>
          </div>

          <!-- Flags -->
          <div>
            <div class="text-xs text-slate-500 mb-2">Flags</div>
            <div class="grid grid-cols-2 gap-1.5">
              <label class="flex items-center gap-2 cursor-pointer select-none group">
                <input type="checkbox" x-model="debug"
                  class="w-3.5 h-3.5 rounded accent-blue-500 cursor-pointer">
                <span class="text-xs text-slate-300 group-hover:text-white transition">Debug Mode</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer select-none group">
                <input type="checkbox" x-model="pvp"
                  class="w-3.5 h-3.5 rounded accent-blue-500 cursor-pointer">
                <span class="text-xs text-slate-300 group-hover:text-white transition">PvP</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer select-none group">
                <input type="checkbox" x-model="tw"
                  class="w-3.5 h-3.5 rounded accent-blue-500 cursor-pointer">
                <span class="text-xs text-slate-300 group-hover:text-white transition">Territory War</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer select-none group">
                <input type="checkbox" x-model="caseInsens"
                  class="w-3.5 h-3.5 rounded accent-blue-500 cursor-pointer">
                <span class="text-xs text-slate-300 group-hover:text-white transition">Case Insensitive</span>
              </label>
            </div>
          </div>

          <!-- Settings -->
          <div>
            <div class="text-xs text-slate-500 mb-2">Settings</div>
            <div class="grid grid-cols-2 gap-2">
              <div>
                <label class="block text-xs text-slate-600 mb-1">Max Name Length</label>
                <input type="number" x-model.number="maxName" min="6" max="32"
                  class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-blue-500">
              </div>
              <div>
                <label class="block text-xs text-slate-600 mb-1">Game Link Instances</label>
                <input type="number" x-model.number="glinkdCount" min="1" max="8"
                  class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-blue-500">
              </div>
              <div>
                <label class="block text-xs text-slate-600 mb-1">DB Workers</label>
                <input type="number" x-model.number="dbWorkers" min="1" max="32"
                  class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-blue-500">
              </div>
              <div>
                <label class="block text-xs text-slate-600 mb-1">Name Workers</label>
                <input type="number" x-model.number="nameWorkers" min="1" max="8"
                  class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-blue-500">
              </div>
            </div>
          </div>

          <!-- Save -->
          <div>
            <button @click="saveSettings()" :disabled="saving"
              class="w-full py-2 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:text-slate-500 text-white text-sm font-medium rounded-lg transition">
              <span x-show="!saving">Save All Settings</span>
              <span x-show="saving">Saving…</span>
            </button>
            <p x-show="cfgMsg" x-text="cfgMsg"
              :class="cfgOk ? 'text-emerald-400' : 'text-red-400'"
              class="mt-2 text-xs text-center font-mono"></p>
          </div>

        </div>
      </div>

    </div><!-- end left col -->

    <!-- ── RIGHT COLUMN (col-span-3) ── -->
    <div class="lg:col-span-3 flex flex-col gap-5">

      <!-- SERVER STATUS ─────────────────────────────────────────── -->
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-widest">Server Status</h2>
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full animate-pulse"
              :class="anyRunning ? 'bg-emerald-500' : 'bg-red-500'"></span>
            <span class="text-xs font-semibold"
              :class="anyRunning ? 'text-emerald-400' : 'text-red-400'"
              x-text="anyRunning ? 'Online' : 'Offline'"></span>
          </div>
        </div>

        <!-- RAM cards -->
        <div class="grid grid-cols-3 gap-3 mb-4">
          <div class="bg-slate-800/60 rounded-lg p-3 text-center">
            <div class="text-base font-semibold text-slate-200" x-text="memTotal || '—'"></div>
            <div class="text-xs text-slate-600 mt-0.5">Total MB</div>
          </div>
          <div class="bg-slate-800/60 rounded-lg p-3 text-center">
            <div class="text-base font-semibold text-amber-400" x-text="memUsed || '—'"></div>
            <div class="text-xs text-slate-600 mt-0.5">Used MB</div>
          </div>
          <div class="bg-slate-800/60 rounded-lg p-3 text-center">
            <div class="text-base font-semibold text-emerald-400" x-text="memFree || '—'"></div>
            <div class="text-xs text-slate-600 mt-0.5">Free MB</div>
          </div>
        </div>

        <!-- Services table -->
        <div class="rounded-lg border border-slate-800 overflow-hidden mb-4">
          <table class="w-full text-xs">
            <thead>
              <tr class="bg-slate-800/80 text-slate-500">
                <th class="text-left px-3 py-2 font-medium">Service</th>
                <th class="text-center px-3 py-2 font-medium w-14">Count</th>
                <th class="text-right px-3 py-2 font-medium w-24">Status</th>
              </tr>
            </thead>
            <tbody>
              <template x-if="services.length === 0">
                <tr>
                  <td colspan="3" class="text-center py-5 text-slate-700 italic">Loading…</td>
                </tr>
              </template>
              <template x-for="(svc, i) in services" :key="i">
                <tr class="border-t border-slate-800/80 transition"
                    :class="svc.process === 'glinkd'
                      ? 'hover:bg-slate-700/40 cursor-pointer'
                      : 'hover:bg-slate-800/30'"
                    @click="svc.process === 'glinkd' && (glinkdOpen = true)">
                  <td class="px-3 py-2 text-slate-300">
                    <span x-text="svc.label"></span>
                    <span x-show="svc.process === 'glinkd'"
                      class="ml-1.5 text-slate-600 text-xs">↗ click for details</span>
                  </td>
                  <td class="px-3 py-2 text-center text-slate-500" x-text="svc.running ? svc.count : '-'"></td>
                  <td class="px-3 py-2 text-right">
                    <span class="inline-block px-2 py-0.5 rounded text-xs font-medium"
                      :class="svc.running
                        ? 'bg-emerald-950 text-emerald-400 border border-emerald-900'
                        : 'bg-red-950/60 text-red-500 border border-red-900/50'"
                      x-text="svc.running ? 'Online' : 'Offline'">
                    </span>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <!-- Action buttons -->
        <div class="flex gap-2">
          <button x-show="anyRunning" @click="serverAction('stop')"
            class="flex-1 py-2 bg-red-700 hover:bg-red-600 text-white text-sm font-medium rounded-lg transition">
            Stop Server
          </button>
          <button x-show="!anyRunning" @click="serverAction('start')"
            class="flex-1 py-2 bg-emerald-700 hover:bg-emerald-600 text-white text-sm font-medium rounded-lg transition">
            Start Server
          </button>
          <button @click="serverAction('restart')"
            class="flex-1 py-2 bg-amber-700 hover:bg-amber-600 text-white text-sm font-medium rounded-lg transition">
            Reboot
          </button>
          <button @click="refreshStatus()"
            class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-slate-200 text-sm font-medium rounded-lg transition">
            ↻ Refresh
          </button>
        </div>
      </div>

    </div><!-- end right col -->
  </div><!-- end grid -->

  <!-- GLINKD MODAL ────────────────────────────────────────────── -->
<div x-show="glinkdOpen" x-cloak
     class="fixed inset-0 z-50 flex items-center justify-center p-4"
     @keydown.escape.window="glinkdOpen = false">
  <div class="absolute inset-0 bg-black/60" @click="glinkdOpen = false"></div>
  <div class="relative bg-slate-900 border border-slate-700 rounded-xl p-5 w-full max-w-lg shadow-2xl">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Game Link Daemon</h2>
      <div class="flex items-center gap-3">
        <span class="text-xs text-slate-500"
          x-text="glinkd.filter(g => g.up).length + ' / ' + glinkd.length + ' online'"></span>
        <button @click="glinkdOpen = false"
          class="text-slate-600 hover:text-slate-300 text-lg leading-none">×</button>
      </div>
    </div>
    <div class="grid grid-cols-4 gap-2">
      <template x-for="g in glinkd" :key="g.instance">
        <div class="rounded-lg border px-2 py-3 text-center"
             :class="g.up ? 'bg-emerald-950/40 border-emerald-900' : 'bg-slate-800/30 border-slate-700/60'">
          <div class="text-sm font-semibold mb-0.5"
               :class="g.up ? 'text-emerald-400' : 'text-slate-600'"
               x-text="'#' + g.instance"></div>
          <div class="text-xs font-mono leading-none"
               :class="g.up ? 'text-emerald-700' : 'text-slate-700'"
               x-text="':' + g.client_port"></div>
          <div class="text-xs font-medium mt-2"
               :class="g.up ? 'text-emerald-500' : 'text-slate-600'"
               x-text="g.up ? 'UP' : 'DOWN'"></div>
        </div>
      </template>
      <template x-if="glinkd.length === 0">
        <div class="col-span-4 text-center py-4 text-slate-700 text-xs italic">No instances</div>
      </template>
    </div>
  </div>
</div>

</div><!-- end x-data -->
{% endblock %}

{% block scripts %}
<script>
function serverPage() {
  return {
    /* status */
    memTotal: 0, memUsed: 0, memFree: 0,
    services: [], glinkd: [], glinkdOpen: false,
    get anyRunning() { return this.services.some(s => s.process === 'gs' && s.running); },

    /* config */
    classMask: 0, classes: [],
    debug: false, xp: 0, sp: 0, drop: 0, gold: 0,
    pvp: false, tw: false, caseInsens: false,
    maxName: 16, glinkdCount: 2, dbWorkers: 2, nameWorkers: 1,
    saving: false, cfgMsg: '', cfgOk: true,

    async init() {
      await Promise.all([this.refreshStatus(), this.loadConfig()]);
      setInterval(() => this.refreshStatus(), 5000);
    },

    async refreshStatus() {
      try {
        const r = await fetch('/api/server/status');
        if (!r.ok) return;
        const d = await r.json();
        this.memTotal = d.mem_total;
        this.memUsed  = d.mem_used;
        this.memFree  = d.mem_free;
        this.services = d.services || [];
        this.glinkd   = d.glinkd   || [];
      } catch(e) {}
    },

    async loadConfig() {
      try {
        const r = await fetch('/api/server/config');
        if (!r.ok) return;
        const d = await r.json();
        this.classMask   = d.class_mask   ?? 0;
        this.classes     = d.classes      ?? [];
        this.debug       = !!d.debug_mode;
        this.xp          = d.exp_bonus    ?? 0;
        this.sp          = d.sp_bonus     ?? 0;
        this.drop        = d.drop_bonus   ?? 0;
        this.gold        = d.money_bonus  ?? 0;
        this.pvp         = !!d.pvp;
        this.tw          = !!d.tw;
        this.caseInsens  = !!d.name_insens;
        this.maxName     = d.name_max_len ?? 16;
        this.glinkdCount = d.glinkd_count ?? 2;
        this.dbWorkers   = d.db_workers   ?? 2;
        this.nameWorkers = d.name_workers ?? 1;
      } catch(e) {}
    },

    calcMask() {
      this.classMask = this.classes.reduce((s, c) => c.checked ? s + c.value : s, 0);
    },

    async saveSettings() {
      this.saving = true; this.cfgMsg = '';
      try {
        const csrf = document.cookie.split('; ').find(c => c.startsWith('csrf_token='))?.split('=')[1] || '';
        const r = await fetch('/api/server/config', {
          method: 'POST',
          headers: {'Content-Type': 'application/json', 'X-CSRF-Token': csrf},
          body: JSON.stringify({
            debug_mode:   this.debug    ? 1 : 0,
            class_mask:   this.classMask,
            exp_bonus:    this.xp,
            sp_bonus:     this.sp,
            drop_bonus:   this.drop,
            money_bonus:  this.gold,
            pvp:          this.pvp       ? 1 : 0,
            tw:           this.tw        ? 1 : 0,
            name_insens:  this.caseInsens ? 1 : 0,
            name_max_len: this.maxName,
            glinkd_count: this.glinkdCount,
            db_workers:   this.dbWorkers,
            name_workers: this.nameWorkers,
          }),
        });
        const d = await r.json().catch(() => ({}));
        this.cfgOk  = r.ok;
        this.cfgMsg = r.ok ? (d.message || 'Saved!') : (d.detail || 'Save failed');
      } catch(e) { this.cfgOk = false; this.cfgMsg = 'Network error'; }
      this.saving = false;
      setTimeout(() => this.cfgMsg = '', 5000);
    },

    async serverAction(action) {
      if (!confirm('Server ' + action + '?')) return;
      alert('Server control not yet wired up.');
    },
  };
}
</script>
{% endblock %}

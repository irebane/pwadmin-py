{% extends "base.html" %}
{% block title %}Server — pwAdmin{% endblock %}

{% block content %}
<div class="max-w-screen-lg mx-auto" x-data="serverPage()">

  <h1 class="text-sm font-semibold text-slate-300 mb-4">Server Management</h1>

  <div x-show="statusMsg" x-cloak
    :class="statusOk ? 'text-emerald-400 bg-emerald-950/40 border-emerald-900/50' : 'text-red-400 bg-red-950/40 border-red-900/50'"
    class="mb-4 text-xs border rounded px-3 py-2" x-text="statusMsg"></div>

  <div class="grid lg:grid-cols-2 gap-5">

    <!-- Daemon status -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
      <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-3">Daemon Status</h2>
      <div x-show="loading" class="text-xs text-slate-600">Loading...</div>
      <div class="space-y-1.5">
        <template x-for="d in daemons" :key="d.name">
          <div class="flex items-center justify-between py-1 border-b border-slate-800/50">
            <span class="text-xs text-slate-400 font-mono" x-text="d.name"></span>
            <span class="flex items-center gap-1.5 text-xs"
              :class="d.running ? 'text-emerald-400' : 'text-red-400'">
              <span class="w-1.5 h-1.5 rounded-full"
                :class="d.running ? 'bg-emerald-500 animate-pulse' : 'bg-red-500'"></span>
              <span x-text="d.running ? 'Running' : 'Stopped'"></span>
            </span>
          </div>
        </template>
      </div>
      <div class="mt-3 pt-3 border-t border-slate-800 text-xs text-slate-500" x-show="ram.total_kb > 0">
        RAM: <span class="text-slate-300" x-text="Math.round(ram.used_kb/1024) + ' MB'"></span>
        used /
        <span x-text="Math.round(ram.total_kb/1024) + ' MB'"></span> total
      </div>
    </div>

    <!-- Game config -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
      <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-3">Game Config</h2>
      <div class="space-y-2 text-xs">
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-slate-500 mb-1">EXP Bonus</label>
            <input type="number" x-model.number="cfg.exp_bonus"
              class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-slate-200 focus:outline-none focus:border-blue-500">
          </div>
          <div>
            <label class="block text-slate-500 mb-1">SP Bonus</label>
            <input type="number" x-model.number="cfg.sp_bonus"
              class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-slate-200 focus:outline-none focus:border-blue-500">
          </div>
          <div>
            <label class="block text-slate-500 mb-1">Drop Bonus</label>
            <input type="number" x-model.number="cfg.drop_bonus"
              class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-slate-200 focus:outline-none focus:border-blue-500">
          </div>
          <div>
            <label class="block text-slate-500 mb-1">Money Bonus</label>
            <input type="number" x-model.number="cfg.money_bonus"
              class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-slate-200 focus:outline-none focus:border-blue-500">
          </div>
          <div>
            <label class="block text-slate-500 mb-1">PvP</label>
            <select x-model.number="cfg.pvp"
              class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-slate-200 focus:outline-none focus:border-blue-500">
              <option value="0">Disabled</option>
              <option value="1">Enabled</option>
            </select>
          </div>
          <div>
            <label class="block text-slate-500 mb-1">Territory War</label>
            <select x-model.number="cfg.tw"
              class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-slate-200 focus:outline-none focus:border-blue-500">
              <option value="0">Disabled</option>
              <option value="1">Enabled</option>
            </select>
          </div>
          <div>
            <label class="block text-slate-500 mb-1">Debug Mode</label>
            <select x-model.number="cfg.debug_mode"
              class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-slate-200 focus:outline-none focus:border-blue-500">
              <option value="0">Off</option>
              <option value="1">Active</option>
            </select>
          </div>
          <div>
            <label class="block text-slate-500 mb-1">Name Max Length</label>
            <input type="number" x-model.number="cfg.name_max_len" min="6" max="32"
              class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-slate-200 focus:outline-none focus:border-blue-500">
          </div>
          <div>
            <label class="block text-slate-500 mb-1">GLinkd Count</label>
            <input type="number" x-model.number="cfg.glinkd_count" min="1" max="8"
              class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-slate-200 focus:outline-none focus:border-blue-500">
          </div>
          <div>
            <label class="block text-slate-500 mb-1">DB Workers</label>
            <input type="number" x-model.number="cfg.db_workers" min="1" max="32"
              class="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-slate-200 focus:outline-none focus:border-blue-500">
          </div>
        </div>
        <button @click="saveCfg()" :disabled="saving"
          class="w-full mt-2 py-2 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:text-slate-500 rounded text-sm font-semibold text-white transition">
          <span x-show="!saving">Save Config</span>
          <span x-show="saving">Saving...</span>
        </button>
        <p class="text-slate-600 text-center text-xs mt-1">Changes require server restart to take effect.</p>
      </div>
    </div>

  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
function serverPage() {
  return {
    daemons: [], ram: {total_kb: 0, free_kb: 0, used_kb: 0},
    cfg: {exp_bonus:0, sp_bonus:0, drop_bonus:0, money_bonus:0, pvp:0, tw:0, debug_mode:0, class_mask:0, name_max_len:16, glinkd_count:1, db_workers:1, name_workers:1},
    loading: true, saving: false, statusMsg: '', statusOk: true,

    async init() {
      await Promise.all([this.loadStatus(), this.loadConfig()]);
      this.loading = false;
    },

    async loadStatus() {
      try {
        const r = await fetch('/api/server/status');
        if (r.ok) {
          const d = await r.json();
          this.daemons = d.daemons || [];
          this.ram = d.ram || this.ram;
        }
      } catch(e) {}
    },

    async loadConfig() {
      try {
        const r = await fetch('/api/server/config');
        if (r.ok) {
          const d = await r.json();
          this.cfg = {...this.cfg, ...d};
        }
      } catch(e) {}
    },

    async saveCfg() {
      this.saving = true;
      this.statusMsg = '';
      try {
        const r = await fetch('/api/server/config', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(this.cfg),
        });
        const d = await r.json().catch(() => ({}));
        if (r.ok) {
          this.statusMsg = d.message || 'Saved!';
          this.statusOk = true;
        } else {
          this.statusMsg = d.detail || 'Save failed';
          this.statusOk = false;
        }
      } catch(e) {
        this.statusMsg = 'Network error';
        this.statusOk = false;
      }
      this.saving = false;
      setTimeout(() => this.statusMsg = '', 4000);
    },
  };
}
</script>
{% endblock %}

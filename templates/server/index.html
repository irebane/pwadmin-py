{% extends "base.html" %}
{% block title %}Server — pwAdmin{% endblock %}

{% block content %}
<div class="max-w-screen-xl mx-auto" x-data="serverPage()">

  <h1 class="text-sm font-semibold text-slate-300 mb-5">Server Management</h1>

  <div class="grid lg:grid-cols-5 gap-5">

    <!-- ── LEFT COLUMN (col-span-2) ── -->
    <div class="lg:col-span-2 flex flex-col gap-5">

      <!-- placeholder config card -->
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
        <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-3">Server Config</h2>
        <p class="text-xs text-slate-600 italic">Config form coming soon…</p>
      </div>

    </div><!-- end left col -->

    <!-- ── RIGHT COLUMN (col-span-3) ── -->
    <div class="lg:col-span-3 flex flex-col gap-5">

      <!-- SERVER STATUS ─────────────────────────────────────────── -->
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-widest">Server Status</h2>
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full animate-pulse"
              :class="anyRunning ? 'bg-emerald-500' : 'bg-red-500'"></span>
            <span class="text-xs font-semibold"
              :class="anyRunning ? 'text-emerald-400' : 'text-red-400'"
              x-text="anyRunning ? 'Online' : 'Offline'"></span>
          </div>
        </div>

        <!-- RAM cards -->
        <div class="grid grid-cols-3 gap-3 mb-4">
          <div class="bg-slate-800/60 rounded-lg p-3 text-center">
            <div class="text-base font-semibold text-slate-200" x-text="memTotal || '—'"></div>
            <div class="text-xs text-slate-600 mt-0.5">Total MB</div>
          </div>
          <div class="bg-slate-800/60 rounded-lg p-3 text-center">
            <div class="text-base font-semibold text-amber-400" x-text="memUsed || '—'"></div>
            <div class="text-xs text-slate-600 mt-0.5">Used MB</div>
          </div>
          <div class="bg-slate-800/60 rounded-lg p-3 text-center">
            <div class="text-base font-semibold text-emerald-400" x-text="memFree || '—'"></div>
            <div class="text-xs text-slate-600 mt-0.5">Free MB</div>
          </div>
        </div>

        <!-- Services table -->
        <div class="rounded-lg border border-slate-800 overflow-hidden mb-4">
          <table class="w-full text-xs">
            <thead>
              <tr class="bg-slate-800/80 text-slate-500">
                <th class="text-left px-3 py-2 font-medium">Service</th>
                <th class="text-center px-3 py-2 font-medium w-14">Count</th>
                <th class="text-right px-3 py-2 font-medium w-24">Status</th>
              </tr>
            </thead>
            <tbody>
              <template x-if="services.length === 0">
                <tr>
                  <td colspan="3" class="text-center py-5 text-slate-700 italic">Loading…</td>
                </tr>
              </template>
              <template x-for="(svc, i) in services" :key="i">
                <tr class="border-t border-slate-800/80 transition"
                    :class="svc.process === 'glinkd'
                      ? 'hover:bg-slate-700/40 cursor-pointer'
                      : 'hover:bg-slate-800/30'"
                    @click="svc.process === 'glinkd' && (glinkdOpen = true)">
                  <td class="px-3 py-2 text-slate-300">
                    <span x-text="svc.label"></span>
                    <span x-show="svc.process === 'glinkd'"
                      class="ml-1.5 text-slate-600 text-xs">↗ click for details</span>
                  </td>
                  <td class="px-3 py-2 text-center text-slate-500" x-text="svc.running ? svc.count : '-'"></td>
                  <td class="px-3 py-2 text-right">
                    <span class="inline-block px-2 py-0.5 rounded text-xs font-medium"
                      :class="svc.running
                        ? 'bg-emerald-950 text-emerald-400 border border-emerald-900'
                        : 'bg-red-950/60 text-red-500 border border-red-900/50'"
                      x-text="svc.running ? 'Online' : 'Offline'">
                    </span>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <!-- Action buttons -->
        <div class="flex gap-2">
          <button x-show="anyRunning" @click="serverAction('stop')"
            class="flex-1 py-2 bg-red-700 hover:bg-red-600 text-white text-sm font-medium rounded-lg transition">
            Stop Server
          </button>
          <button x-show="!anyRunning" @click="serverAction('start')"
            class="flex-1 py-2 bg-emerald-700 hover:bg-emerald-600 text-white text-sm font-medium rounded-lg transition">
            Start Server
          </button>
          <button @click="serverAction('restart')"
            class="flex-1 py-2 bg-amber-700 hover:bg-amber-600 text-white text-sm font-medium rounded-lg transition">
            Reboot
          </button>
          <button @click="refreshStatus()"
            class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-slate-200 text-sm font-medium rounded-lg transition">
            ↻ Refresh
          </button>
        </div>
      </div>

    </div><!-- end right col -->
  </div><!-- end grid -->

  <!-- GLINKD MODAL ────────────────────────────────────────────── -->
<div x-show="glinkdOpen" x-cloak
     class="fixed inset-0 z-50 flex items-center justify-center p-4"
     @keydown.escape.window="glinkdOpen = false">
  <div class="absolute inset-0 bg-black/60" @click="glinkdOpen = false"></div>
  <div class="relative bg-slate-900 border border-slate-700 rounded-xl p-5 w-full max-w-lg shadow-2xl">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Game Link Daemon</h2>
      <div class="flex items-center gap-3">
        <span class="text-xs text-slate-500"
          x-text="glinkd.filter(g => g.up).length + ' / ' + glinkd.length + ' online'"></span>
        <button @click="glinkdOpen = false"
          class="text-slate-600 hover:text-slate-300 text-lg leading-none">×</button>
      </div>
    </div>
    <div class="grid grid-cols-4 gap-2">
      <template x-for="g in glinkd" :key="g.instance">
        <div class="rounded-lg border px-2 py-3 text-center"
             :class="g.up ? 'bg-emerald-950/40 border-emerald-900' : 'bg-slate-800/30 border-slate-700/60'">
          <div class="text-sm font-semibold mb-0.5"
               :class="g.up ? 'text-emerald-400' : 'text-slate-600'"
               x-text="'#' + g.instance"></div>
          <div class="text-xs font-mono leading-none"
               :class="g.up ? 'text-emerald-700' : 'text-slate-700'"
               x-text="':' + g.client_port"></div>
          <div class="text-xs font-medium mt-2"
               :class="g.up ? 'text-emerald-500' : 'text-slate-600'"
               x-text="g.up ? 'UP' : 'DOWN'"></div>
        </div>
      </template>
      <template x-if="glinkd.length === 0">
        <div class="col-span-4 text-center py-4 text-slate-700 text-xs italic">No instances</div>
      </template>
    </div>
  </div>
</div>

</div><!-- end x-data -->
{% endblock %}

{% block scripts %}
<script>
function serverPage() {
  return {
    memTotal: 0, memUsed: 0, memFree: 0,
    services: [],
    glinkd: [],
    glinkdOpen: false,
    get anyRunning() { return this.services.some(s => s.process === 'gs' && s.running); },

    async init() {
      await this.refreshStatus();
      setInterval(() => this.refreshStatus(), 5000);
    },

    async refreshStatus() {
      try {
        const r = await fetch('/api/server/status');
        if (!r.ok) return;
        const d = await r.json();
        this.memTotal   = d.mem_total;
        this.memUsed    = d.mem_used;
        this.memFree    = d.mem_free;
        this.services   = d.services || [];
        this.glinkd     = d.glinkd   || [];
      } catch(e) {}
    },

    async serverAction(action) {
      if (!confirm('Server ' + action + '?')) return;
      alert('Server control not yet wired up.');
    },
  };
}
</script>
{% endblock %}
